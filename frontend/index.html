<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auracle</title>
    <script>
      // Apply persisted theme + background before first paint to prevent flash
      (function () {
        var t = localStorage.getItem("auracle-theme");
        var dark = t !== "light";
        if (dark) document.documentElement.classList.add("dark");
        document.documentElement.style.background = dark ? "#0a0a0a" : "#ffffff";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
