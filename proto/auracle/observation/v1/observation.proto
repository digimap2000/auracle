syntax = "proto3";

package auracle.observation.v1;

option cc_enable_arenas = true;

message DecodedField {
    string field = 1;
    string type = 2;
    string value = 3;
}

message DecodedServiceData {
    string service_uuid = 1;
    string service_label = 2;
    string raw_value = 3;           // hex string, for example 0x0400
    repeated DecodedField fields = 4;
    uint32 status_code = 5;
    string status_message = 6;
}

message ServiceDataEnumEntryMetadata {
    uint32 value = 1;
    string short_name = 2;
    string description = 3;
}

message ServiceDataFieldMetadata {
    string field = 1;
    string type = 2;
    string enum_match = 3;
    repeated ServiceDataEnumEntryMetadata enum_entries = 4;
}

message ServiceDataFormatMetadata {
    string service_uuid = 1;
    string service_label = 2;
    string service_description = 3;
    repeated ServiceDataFieldMetadata fields = 4;
    uint32 status_code = 5;
    string status_message = 6;
}

// ---------------------------------------------------------------------------
// BLE advertisement
// ---------------------------------------------------------------------------

message BleAdvertisement {
    string device_id = 1;           // platform-stable peripheral identifier
    string name = 2;                // local name (may be empty)
    int32 rssi = 3;                 // received signal strength (dBm)
    int32 tx_power = 4;             // TX power level (dBm), 127 = unknown
    repeated string service_uuids = 5;
    map<string, string> service_labels = 17; // resolved service labels keyed by UUID
    bytes manufacturer_data = 6;    // raw manufacturer-specific data (after company ID)
    uint32 company_id = 7;          // Bluetooth SIG company identifier
    string address_type = 8;        // public, random, etc when known
    uint32 sid = 9;                 // advertising SID when known, 255 = unknown
    uint32 adv_type = 10;           // transport-specific advertising type
    uint32 adv_props = 11;          // transport-specific advertising properties bitmask
    uint32 interval = 12;           // advertising interval units from source packet
    uint32 primary_phy = 13;
    uint32 secondary_phy = 14;
    bytes raw_data = 15;            // raw advertising payload
    bytes raw_scan_response = 16;   // raw scan response payload if available
}

// ---------------------------------------------------------------------------
// Observation event
// ---------------------------------------------------------------------------

message ObservationEvent {
    int64 timestamp_ms = 1;
    string unit_id = 2;             // which unit produced this observation
    oneof payload {
        BleAdvertisement ble_advertisement = 3;
    }
}

// ---------------------------------------------------------------------------
// Retained scan state
// ---------------------------------------------------------------------------

message ObservedBleDevice {
    string unit_id = 1;
    BleAdvertisement advertisement = 2;
    int64 first_seen_ms = 3;
    int64 last_seen_ms = 4;
    uint64 seen_count = 5;
}

// ---------------------------------------------------------------------------
// Service
// ---------------------------------------------------------------------------

message StartScanRequest {
    string unit_id = 1;
    bool allow_duplicates = 2;      // report every advertisement, not just first per device
}

message StartScanResponse {}

message StopScanRequest {
    string unit_id = 1;
}

message StopScanResponse {}

message ListObservedDevicesRequest {
    string unit_id = 1;             // empty = all units
}

message ListObservedDevicesResponse {
    repeated ObservedBleDevice devices = 1;
}

message WatchObservationsRequest {
    string unit_id = 1;             // empty = all units
    bool include_initial_snapshot = 2;
}

message DecodeAdvertisementRequest {
    bytes raw_data = 1;
    bytes raw_scan_response = 2;
}

message DecodeAdvertisementResponse {
    repeated DecodedServiceData decoded_service_data = 1;
}

message DescribeServiceDataFormatsRequest {
    repeated string service_uuids = 1;
}

message DescribeServiceDataFormatsResponse {
    repeated ServiceDataFormatMetadata formats = 1;
}

service ObservationService {
    rpc StartScan(StartScanRequest) returns (StartScanResponse);
    rpc StopScan(StopScanRequest) returns (StopScanResponse);
    rpc ListObservedDevices(ListObservedDevicesRequest) returns (ListObservedDevicesResponse);
    rpc WatchObservations(WatchObservationsRequest) returns (stream ObservationEvent);
    rpc DecodeAdvertisement(DecodeAdvertisementRequest) returns (DecodeAdvertisementResponse);
    rpc DescribeServiceDataFormats(DescribeServiceDataFormatsRequest) returns (DescribeServiceDataFormatsResponse);
}
